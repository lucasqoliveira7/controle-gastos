<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Gastos — Entrar</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', sans-serif;
  background: #0f1117;
  color: #f1f3f9;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-font-smoothing: antialiased;
}

.card {
  background: #1a1d27;
  border: 1px solid #2e3244;
  border-radius: 20px;
  padding: 40px 36px;
  width: 400px;
  max-width: 95vw;
  box-shadow: 0 24px 64px rgba(0,0,0,.5);
}

.logo {
  font-size: 32px;
  text-align: center;
  margin-bottom: 6px;
}
.title {
  font-size: 22px;
  font-weight: 700;
  text-align: center;
  color: #f1f3f9;
  margin-bottom: 4px;
}
.subtitle {
  font-size: 13px;
  color: #6b7280;
  text-align: center;
  margin-bottom: 32px;
}

.tabs {
  display: flex;
  background: #252836;
  border-radius: 10px;
  padding: 4px;
  margin-bottom: 28px;
  gap: 4px;
}
.tab {
  flex: 1;
  padding: 9px;
  border: none;
  border-radius: 7px;
  background: transparent;
  color: #6b7280;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: all .15s;
}
.tab.active {
  background: #2563eb;
  color: #fff;
}

label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: #9ca3af;
  margin-bottom: 6px;
}
input[type="text"],
input[type="email"],
input[type="password"] {
  width: 100%;
  padding: 11px 14px;
  background: #252836;
  border: 1.5px solid #2e3244;
  border-radius: 10px;
  color: #f1f3f9;
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: border-color .15s;
  margin-bottom: 16px;
}
input:focus { border-color: #2563eb; }
input::placeholder { color: #4b5563; }

.btn {
  width: 100%;
  padding: 12px;
  background: #2563eb;
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: background .15s, opacity .15s;
  margin-top: 4px;
}
.btn:hover { background: #1d4ed8; }
.btn:disabled { opacity: .5; cursor: default; }

.msg {
  font-size: 12px;
  text-align: center;
  padding: 10px 14px;
  border-radius: 8px;
  margin-top: 14px;
  display: none;
}
.msg.error { background: #3b1414; color: #f87171; display: block; }
.msg.success { background: #14532d; color: #86efac; display: block; }

.divider {
  height: 1px;
  background: #2e3244;
  margin: 24px 0;
}
.forgot {
  font-size: 12px;
  color: #6b7280;
  text-align: center;
  cursor: pointer;
}
.forgot:hover { color: #9ca3af; }

.spinner {
  display: none;
  width: 18px;
  height: 18px;
  border: 2px solid rgba(255,255,255,.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  margin: 0 auto;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="logo">💰</div>
  <div class="title">Controle de Gastos</div>
  <div class="subtitle">Seu app financeiro pessoal</div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('login')">Entrar</button>
    <button class="tab" onclick="showTab('register')">Criar conta</button>
  </div>

  <!-- Login -->
  <div id="pane-login">
    <label>E-mail</label>
    <input type="email" id="login-email" placeholder="seu@email.com" onkeydown="if(event.key==='Enter')doLogin()">
    <label>Senha</label>
    <input type="password" id="login-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn" id="btn-login" onclick="doLogin()">
      <span id="btn-login-txt">Entrar →</span>
      <div class="spinner" id="spin-login"></div>
    </button>
  </div>

  <!-- Register -->
  <div id="pane-register" style="display:none">
    <label>Seu nome</label>
    <input type="text" id="reg-name" placeholder="Como quer ser chamado?" maxlength="40">
    <label>E-mail</label>
    <input type="email" id="reg-email" placeholder="seu@email.com">
    <label>Senha</label>
    <input type="password" id="reg-pass" placeholder="mínimo 6 caracteres" onkeydown="if(event.key==='Enter')doRegister()">
    <button class="btn" id="btn-register" onclick="doRegister()">
      <span id="btn-register-txt">Criar conta →</span>
      <div class="spinner" id="spin-register"></div>
    </button>
  </div>

  <div class="msg" id="msg"></div>
</div>

<script>
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Se já está logado, vai direto pro app
sb.auth.getSession().then(({ data: { session } }) => {
  if (session) window.location.href = 'app.html';
});

function showTab(tab) {
  document.getElementById('pane-login').style.display    = tab === 'login'    ? '' : 'none';
  document.getElementById('pane-register').style.display = tab === 'register' ? '' : 'none';
  document.querySelectorAll('.tab').forEach((b, i) => b.classList.toggle('active', (i === 0) === (tab === 'login')));
  setMsg('');
}

function setMsg(text, type='error') {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg' + (text ? ' ' + type : '');
}

function setLoading(btn, spin, loading) {
  document.getElementById(btn).disabled = loading;
  document.getElementById(btn + '-txt').style.display = loading ? 'none' : '';
  document.getElementById('spin-' + spin).style.display = loading ? 'block' : 'none';
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  if (!email || !pass) return setMsg('Preencha e-mail e senha.');
  setLoading('btn-login', 'login', true);
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  setLoading('btn-login', 'login', false);
  if (error) return setMsg(translateError(error.message));
  window.location.href = 'app.html';
}

async function doRegister() {
  const name  = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass  = document.getElementById('reg-pass').value;
  if (!name || !email || !pass) return setMsg('Preencha todos os campos.');
  if (pass.length < 6) return setMsg('A senha deve ter pelo menos 6 caracteres.');
  setLoading('btn-register', 'register', true);
  const { error } = await sb.auth.signUp({
    email, password: pass,
    options: { data: { name } }
  });
  setLoading('btn-register', 'register', false);
  if (error) return setMsg(translateError(error.message));
  await sb.auth.signOut();
  setMsg('Conta criada! Faça login para entrar.', 'success');
  showTab('login');
  document.getElementById('login-email').value = email;
}

function translateError(msg) {
  if (msg.includes('Invalid login')) return 'E-mail ou senha incorretos.';
  if (msg.includes('Email not confirmed')) return 'Confirme seu e-mail antes de entrar.';
  if (msg.includes('already registered')) return 'Este e-mail já está cadastrado.';
  if (msg.includes('Password should')) return 'A senha deve ter pelo menos 6 caracteres.';
  return msg;
}
</script>
</body>
</html>
